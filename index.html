<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JJSTAR Guide Demo</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/style_l3.css">
  <style>
    :root {
      --blue: #005da8;
      --blue-dark: #00427a;
      --line: #dde5ee;
      --bg: #f5f7fb;
      --group-bg: #f3f4f6;
      --mid-bg: #eef3f9;
      --small-bg: #fafcff;
      --active: #dceeff;
      --text: #1f2937;
      --muted: #6b7280;
      --shadow: 0 10px 30px rgba(0, 0, 0, .08);
      --radius: 16px;
      --sidebar-width: 360px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Pretendard, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text)
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      overflow: hidden;
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid var(--line);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      background: var(--blue);
      color: #fff;
      padding: 18px
    }

    .brand {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 12px
    }

    .search {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 14px
    }

    .search-count {
      font-size: 12px;
      color: #fff;
      opacity: 0.82;
      margin-top: 8px;
      text-align: right;
    }

    .nav {
      padding: 10px 0 18px;
      overflow: auto;
      flex: 1
    }

    .group {
      background: var(--group-bg);
      border-bottom: 1px solid #edf2f7;
      margin-bottom: 4px
    }

    .group-btn,
    .mid-btn,
    .small-btn {
      width: 100%;
      border: 0;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px
    }

    .group-btn {
      background: var(--group-bg);
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800
    }

    .group-children {
      display: none;
      background: #fff;
      padding: 8px;
      border-top: 1px solid #e5e7eb
    }

    .group.open .group-children {
      display: block
    }

    .mid {
      border: 1px solid #e7edf5;
      border-radius: 12px;
      overflow: hidden;
      background: var(--mid-bg);
      margin-bottom: 8px
    }

    .mid-btn {
      background: var(--mid-bg);
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700
    }

    .mid.open>.mid-children {
      display: block
    }

    .mid.active>.mid-btn {
      background: var(--active);
      color: var(--blue-dark)
    }

    .mid-children {
      display: none;
      padding: 8px;
      border-top: 1px solid #dde7f2;
      background: #fff
    }

    .small-btn {
      background: var(--small-bg);
      border: 1px solid #edf2f7;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      font-size: 13px
    }

    .small-btn.active {
      background: var(--active);
      color: var(--blue-dark);
      font-weight: 700;
      border-color: #c8ddf5
    }

    .label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .indicator {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, .75);
      color: #475569;
      font-weight: 800
    }

    .content {
      height: 100vh;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10
    }

    .menu-toggle {
      display: none;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      flex: 0 1 auto;
      border: 1px solid #e2e8f0;
      padding: 0;
      height: 38px;
    }

    .breadcrumb-item {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 18px 0 28px;
      height: 100%;
      font-size: 13px;
      color: #64748b;
      background: #f8fafc;
      cursor: pointer;
      transition: all 0.2s ease;
      clip-path: polygon(0% 0%, calc(100% - 10px) 0%, 100% 50%, calc(100% - 10px) 100%, 0% 100%, 10px 50%);
      margin-left: -10px;
      white-space: nowrap;
      border: none;
      outline: none;
    }

    .breadcrumb-item:first-child {
      margin-left: 0;
      padding-left: 18px;
      clip-path: polygon(0% 0%, calc(100% - 10px) 0%, 100% 50%, calc(100% - 10px) 100%, 0% 100%);
    }

    .breadcrumb-item:hover:not(.active) {
      background: #edf2f7;
      color: var(--blue);
      z-index: 2;
    }

    .breadcrumb-item.active {
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      z-index: 3;
      clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 100% 100%, 0% 100%, 10px 50%);
    }
    
    .breadcrumb-item:first-child.active {
       clip-path: none;
    }

    .breadcrumb-item img {
      width: 14px;
      height: 14px;
      margin-right: 0;
      filter: grayscale(1) opacity(0.6);
    }
    
    .breadcrumb-item.active img {
      filter: brightness(0) invert(1);
    }
    
    .breadcrumb-item.home-btn {
      padding-right: 15px;
    }

    .home-link {
      margin-left: auto;
    }

    .page {
      padding: 28px;
      overflow-y: auto;
      flex: 1;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .status {
      font-size: 13px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 10px
    }

    .viewer {
      margin-top: 18px
    }

    .loading,
    .empty {
      padding: 36px;
      border: 1px dashed #cfd8e3;
      border-radius: 16px;
      color: #64748b;
      background: #fafcff
    }

    .pager {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 24px
    }

    .pager button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      min-width: 120px
    }

    .pager button:disabled {
      opacity: .45;
      cursor: not-allowed
    }

    .dim {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .35);
      z-index: 15
    }

    @media (max-width:900px) {
      .app {
        grid-template-columns: 1fr
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(88vw, 360px);
        transform: translateX(-100%);
        transition: transform .22s ease;
        z-index: 20
      }

      .sidebar.open {
        transform: translateX(0)
      }

      .menu-toggle {
        display: inline-flex
      }

      .dim.show {
        display: block
      }

      .page {
        padding: 18px
      }

      .card {
        padding: 22px 18px
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand">JJSTAR 이용 가이드</div>
        <input id="searchInput" class="search" type="text" placeholder="메뉴 검색" />
        <div id="searchCount" class="search-count">전체 0건</div>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>

    <main class="content">
      <div class="topbar">
        <button class="menu-toggle" id="menuToggle">☰ 메뉴</button>
        <div class="breadcrumb" id="breadcrumb">JJSTAR 이용 가이드</div>
        <a href="jjstar_home.html" target="_top" class="home-link">
          <img src="assets/icons/home_fill.png" alt="시스템 홈" class="home-icon">
        </a>
      </div>
      <section class="page">
        <article class="card">
          <div id="viewer" class="viewer">
            <div class="loading">문서를 로드하는 중입니다.</div>
          </div>
          <div class="pager">
            <button id="prevBtn">← 이전</button>
            <button id="nextBtn">다음 →</button>
          </div>
        </article>
      </section>
    </main>
  </div>
  <div class="dim" id="dim"></div>

  <!-- Image Lightbox -->
  <div id="lightbox">
    <span class="close-btn">&times;</span>
    <img src="" id="lightbox-img">
  </div>

  <script src="data/menu.js"></script>
  <script src="assets/js/search.js"></script>
  <script>
    const menu = window.JJSTAR_MENU || [];
    const docs = [];
    menu.forEach(cat => {
      // Level 2 (Category) - Also include it in docs array
      docs.push({ type: 'cat', category: cat.title, title: cat.title, mid: '', small: '', path: cat.path });
      
      cat.children.forEach(mid => {
        // Level 3 (Mid)
        docs.push({ type: 'mid', category: cat.title, title: mid.title, mid: mid.title, small: '', path: mid.path });
        
        if (mid.children) {
          mid.children.forEach(small => {
            // Level 4 (Small)
            docs.push({ type: 'small', category: cat.title, title: small.title, mid: mid.title, small: small.title, path: small.path });
          });
        }
      });
    });

    const nav = document.getElementById('nav');
    const viewer = document.getElementById('viewer');
    const breadcrumb = document.getElementById('breadcrumb');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const searchInput = document.getElementById('searchInput');
    const searchCountDisplay = document.getElementById('searchCount');
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const dim = document.getElementById('dim');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    let currentIndex = 0;
    let keyword = '';
    let openCategories = new Set([menu[0]?.title]);
    let openMids = new Set([menu[0]?.children[0]?.title]);

    // [Phase 3-1] 중앙 관리형 링크 데이터셋
    const GUIDE_LINKS = {
      "c01_m02_s06": "jjstar_mockup.html",
      // 향후 추가될 메뉴 코드와 URL 매핑
    };

    function toggleMark(v) { return v ? '−' : '+'; }

    function highlight(text) {
      if (typeof JJSTAR_SEARCH !== 'undefined') {
        return JJSTAR_SEARCH.highlightText(text, keyword);
      }
      return text;
    }

    function renderNav() {
      let filtered = menu;
      if (keyword && typeof JJSTAR_SEARCH !== 'undefined') {
        filtered = JJSTAR_SEARCH.filterMenu(menu, keyword);
      }

      nav.innerHTML = '';
      const current = docs[currentIndex];
      let totalVisibleItems = 0;

      filtered.forEach(cat => {
        const groupOpen = openCategories.has(cat.title);
        const group = document.createElement('section');
        group.className = `group ${groupOpen ? 'open' : ''}`;

        const gbtn = document.createElement('button');
        gbtn.className = 'group-btn';
        gbtn.innerHTML = `<span class="label">${highlight(cat.title)}</span><span class="indicator">${toggleMark(groupOpen)}</span>`;

        // [Step 1] 대분류 클릭 시 하위 메뉴 토글 (Phase 2-5)
        gbtn.onclick = (e) => {
          e.stopPropagation();
          if (openCategories.has(cat.title)) {
            openCategories.delete(cat.title);
          } else {
            // [Phase 2-6] 일반 모드(keyword 없음)에서만 배타적 펼침 적용
            if (!keyword) openCategories.clear();
            openCategories.add(cat.title);
          }
          renderNav();
        };

        const gchildren = document.createElement('div');
        gchildren.className = 'group-children';

        cat.children.forEach(mid => {
          totalVisibleItems++;
          const midOpen = openMids.has(mid.title);
          const active = current && current.category === cat.title && current.mid === mid.title;
          const midWrap = document.createElement('div');
          midWrap.className = `mid ${midOpen ? 'open' : ''} ${active ? 'active' : ''}`;

          const mbtn = document.createElement('button');
          mbtn.className = 'mid-btn';
          if (active) mbtn.classList.add('is-active');
          mbtn.innerHTML = `<span class="label">${highlight(mid.title)}</span><span class="indicator">${toggleMark(midOpen)}</span>`;

          mbtn.onclick = (e) => {
            e.stopPropagation();
            if (openMids.has(mid.title)) {
              openMids.delete(mid.title);
            } else {
              // [Phase 2-6] 일반 모드에서만 동일 카테고리 내 다른 중분류 닫기
              if (!keyword) cat.children.forEach(m => openMids.delete(m.title));
              openMids.add(mid.title);
              openCategories.add(cat.title);
            }

            currentIndex = docs.findIndex(d => d.type === 'mid' && d.category === cat.title && d.mid === mid.title);
            renderDetail();
            renderNav();
            if (window.innerWidth <= 900) closeSidebar();
          };

          const mchildren = document.createElement('div');
          mchildren.className = 'mid-children';
          mid.children.forEach(small => {
            totalVisibleItems++;
            const btn = document.createElement('button');
            btn.className = 'small-btn';
            btn.innerHTML = `<span class="label">${highlight(small.title)}</span>`;

            const idx = docs.findIndex(d => d.type === 'small' && d.category === cat.title && d.mid === mid.title && d.small === small.title);
            if (idx === currentIndex) {
              btn.classList.add('active');
              btn.classList.add('is-active');
            }

            btn.onclick = (e) => {
              e.stopPropagation();
              openCategories.add(cat.title);
              openMids.add(mid.title);
              currentIndex = idx;
              renderDetail();
              renderNav();
              if (window.innerWidth <= 900) closeSidebar();
            };
            mchildren.appendChild(btn);
          });

          midWrap.appendChild(mbtn);
          midWrap.appendChild(mchildren);
          gchildren.appendChild(midWrap);
        });

        group.appendChild(gbtn);
        group.appendChild(gchildren);
        nav.appendChild(group);
      });

      // [Phase 2-6] 검색 결과 카운트: 매칭된 총 항목 수
      searchCountDisplay.textContent = keyword ? `검색 결과: ${totalVisibleItems}건` : `전체 메뉴: ${docs.length}건`;

      if (keyword && totalVisibleItems === 0) {
        nav.innerHTML = '<div class="empty" style="margin:20px; color:#fff; text-align:center;">일치하는 검색 결과가 없습니다.</div>';
      }

      // Scroll active item into view
      setTimeout(() => {
        const activeItem = nav.querySelector('.is-active');
        if (activeItem) {
          activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    }

    async function renderDetail() {
      const current = docs[currentIndex];
      if (!current) return;

      // [Phase 3-7] 정밀한 Base URL 추출: index.html이 위치한 절대 폴더 경로 확보
      const absoluteBase = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');

      // Explore focus: active and expand current doc lineage
      // [Exclusive Expand] Only toggle current category when in normal mode
      if (!keyword) {
        openCategories.clear();
        openMids.clear();
      }
      openCategories.add(current.category);
      if (current.mid) openMids.add(current.mid);

      breadcrumb.innerHTML = '';
      const parts = [{ label: '홈', level: 'home', icon: 'assets/icons/home_fill.png' }];
      parts.push({ label: current.category, level: 'cat' });
      if (current.mid) parts.push({ label: current.mid, level: 'mid' });
      if (current.small) parts.push({ label: current.small, level: 'small' });

      parts.forEach((p, index) => {
        const span = document.createElement('span');
        span.className = 'breadcrumb-item';
        if (p.level === 'home') span.classList.add('home-btn');
        if (index === parts.length - 1) span.classList.add('active');
        
        if (p.icon) {
          const img = document.createElement('img');
          img.src = p.icon;
          span.appendChild(img);
        } else {
          span.textContent = p.label;
        }
        
        // 클릭 시 해당 카테고리로 이동 (브레드크럼 피드백 수정)
        span.onclick = () => {
          if (index === parts.length - 1) return; // 현재 페이지면 무시
          
          let targetIdx = -1;
          if (p.level === 'home') {
            targetIdx = 0; // 메인(L01HOME)으로 이동
          } else if (p.level === 'cat') {
            // 해당 대분류(L02) 문서를 찾음
            targetIdx = docs.findIndex(d => d.type === 'cat' && d.category === p.label);
          } else if (p.level === 'mid') {
            // 해당 중분류(L03) 문서를 찾음
            targetIdx = docs.findIndex(d => d.category === current.category && d.mid === p.label && d.type === 'mid');
          }
          
          if (targetIdx !== -1) {
            currentIndex = targetIdx;
            renderDetail();
            renderNav();
          }
        };
        breadcrumb.appendChild(span);
      });

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === docs.length - 1;
      viewer.innerHTML = '<div class="loading">문서를 로드하는 중입니다.</div>';

      try {
        // [Phase 3-7] absoluteBase와 결합하여 어떤 환경에서도 정확한 경로로 fetch
        const res = await fetch(absoluteBase + current.path);
        if (!res.ok) throw new Error(`문서를 로드할 수 없습니다. (Status: ${res.status})`);
        let html = await res.text();

        // [Phase 3-7] 모든 로컬 src 경로(../../ 등)를 absoluteBase 기반 절대 경로로 강제 치환
        html = html.replace(/src="(?!http|https|data:)/g, 'src="' + absoluteBase);

        viewer.innerHTML = html;
        document.querySelector('.page').scrollTop = 0;

        const h1 = viewer.querySelector('h1');
        if (h1) h1.textContent = current.small || current.mid || current.title;

        // [Phase 3-1] 중앙 관리형 링크 주입
        const directLinkBtn = viewer.querySelector('#direct-link');
        if (directLinkBtn) {
          // 파일명에서 코드 추출 (새로운 L04... 형식 대응)
          const fileName = current.path.split('/').pop();
          const match = fileName.match(/L[0-9]+[A-Z]+/);
          const menuCode = match ? match[0] : null;

          if (menuCode && GUIDE_LINKS[menuCode]) {
            directLinkBtn.href = GUIDE_LINKS[menuCode];
            directLinkBtn.target = "_blank";
          } else {
            directLinkBtn.style.display = 'none'; // 링크가 없는 경우 버튼 숨김
          }
        }

      } catch (e) {
        viewer.innerHTML = `
          <div class="empty">
            <strong>${current.title}</strong><br><br>
            <span style="color:#ef4444;">오류 발생: ${e.message}</span><br><br>
            <small>Live Server(http://...) 환경에서 실행 중인지 확인해주세요.</small>
          </div>`;
      }
    }

    viewer.addEventListener('click', e => {
      if (e.target.tagName === 'IMG') {
        lightboxImg.src = e.target.src;
        lightbox.classList.add('show');
      }
    });

    lightbox.onclick = () => lightbox.classList.remove('show');

    function closeSidebar() { sidebar.classList.remove('open'); dim.classList.remove('show'); }
    function openSidebar() { sidebar.classList.add('open'); dim.classList.add('show'); }

    menuToggle.onclick = () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    dim.onclick = closeSidebar;

    let searchTimer;
    searchInput.addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const prevKeyword = keyword;
        keyword = e.target.value.trim().toLowerCase();

        if (keyword && keyword !== prevKeyword && typeof JJSTAR_SEARCH !== 'undefined') {
          const filtered = JJSTAR_SEARCH.filterMenu(menu, keyword);
          filtered.forEach(cat => {
            if (cat._hasSmallMatch) openCategories.add(cat.title);
            cat.children.forEach(mid => {
              if (mid._hasSmallMatch) openMids.add(mid.title);
            });
          });
        } else if (!keyword && prevKeyword) {
          // [Step 3] 검색어 삭제 시 초기화 (Phase 2-5)
          openCategories.clear();
          openMids.clear();
          if (docs[currentIndex]) {
            openCategories.add(docs[currentIndex].category);
            openMids.add(docs[currentIndex].mid);
          }
        }

        renderNav();
      }, 250);
    });

    prevBtn.onclick = () => { if (currentIndex > 0) { currentIndex--; renderDetail(); renderNav(); } };
    nextBtn.onclick = () => { if (currentIndex < docs.length - 1) { currentIndex++; renderDetail(); renderNav(); } };

    const startPath = 'pages/L01HOME.html';
    const startIdx = docs.findIndex(d => d.path === startPath);
    currentIndex = startIdx !== -1 ? startIdx : 0;
    renderDetail();
    renderNav();

    // [Phase 3-10] iframe 내 로드 시 스크롤 정책 강제 활성화
    window.addEventListener('load', () => {
      if (window.self !== window.top) {
        document.documentElement.style.overflow = 'auto';
        document.body.style.overflow = 'auto';
        // 콘텐츠 영역(.page)의 스크롤바가 생기도록 보장
        const page = document.querySelector('.page');
        if (page) page.style.overflowY = 'auto';
      }
    });
  </script>
</body>

</html>
