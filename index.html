<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JJSTAR Guide Demo</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/style_l3.css">
  <style>
    :root {
      --blue: #005da8;
      --blue-dark: #00427a;
      --line: #dde5ee;
      --bg: #f5f7fb;
      --group-bg: #f3f4f6;
      --mid-bg: #eef3f9;
      --small-bg: #fafcff;
      --active: #dceeff;
      --text: #1f2937;
      --muted: #6b7280;
      --shadow: 0 10px 30px rgba(0, 0, 0, .08);
      --radius: 16px;
      --sidebar-width: 360px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Pretendard, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text)
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      overflow: hidden;
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid var(--line);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      background: var(--blue);
      color: #fff;
      padding: 18px
    }

    .brand {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 12px
    }

    .search {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 14px
    }

    .search-count {
      font-size: 12px;
      color: #fff;
      opacity: 0.82;
      margin-top: 8px;
      text-align: right;
    }

    .nav {
      padding: 10px 0 18px;
      overflow: auto;
      flex: 1
    }

    .group {
      background: var(--group-bg);
      border-bottom: 1px solid #edf2f7;
      margin-bottom: 4px
    }

    .group-btn,
    .mid-btn,
    .small-btn {
      width: 100%;
      border: 0;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px
    }

    .group-btn {
      background: var(--group-bg);
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800
    }

    .group-children {
      display: none;
      background: #fff;
      padding: 8px;
      border-top: 1px solid #e5e7eb
    }

    .group.open .group-children {
      display: block
    }

    .mid {
      border: 1px solid #e7edf5;
      border-radius: 12px;
      overflow: hidden;
      background: var(--mid-bg);
      margin-bottom: 8px
    }

    .mid-btn {
      background: var(--mid-bg);
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700
    }

    .mid.open>.mid-children {
      display: block
    }

    .mid.active>.mid-btn {
      background: var(--active);
      color: var(--blue-dark)
    }

    .mid-children {
      display: none;
      padding: 8px;
      border-top: 1px solid #dde7f2;
      background: #fff
    }

    .small-btn {
      background: var(--small-bg);
      border: 1px solid #edf2f7;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      font-size: 13px
    }

    .small-btn.active {
      background: var(--active);
      color: var(--blue-dark);
      font-weight: 700;
      border-color: #c8ddf5
    }

    .label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .indicator {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, .75);
      color: #475569;
      font-weight: 800
    }

    .content {
      height: 100vh;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10
    }

    .menu-toggle {
      display: none;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0;
      background: #f1f5f9;
      border-radius: 8px;
      overflow: hidden;
      flex: 0 1 auto;
    }

    .breadcrumb-item {
      position: relative;
      display: flex;
      align-items: center;
      padding: 6px 16px 6px 24px;
      font-size: 13px;
      color: #64748b;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      clip-path: polygon(0% 0%, calc(100% - 10px) 0%, 100% 50%, calc(100% - 10px) 100%, 0% 100%, 10px 50%);
      margin-left: -10px;
      white-space: nowrap;
    }

    .breadcrumb-item:first-child {
      margin-left: 0;
      padding-left: 16px;
      clip-path: polygon(0% 0%, calc(100% - 10px) 0%, 100% 50%, calc(100% - 10px) 100%, 0% 100%);
    }

    .breadcrumb-item:hover {
      background: #f8fafc;
      color: var(--blue);
      z-index: 2;
    }

    .breadcrumb-item.active {
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      z-index: 3;
    }

    .breadcrumb-item:last-child {
      padding-right: 18px;
    }

    .page {
      padding: 28px;
      overflow-y: auto;
      flex: 1;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .status {
      font-size: 13px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 10px
    }

    .viewer {
      margin-top: 18px
    }

    .loading,
    .empty {
      padding: 36px;
      border: 1px dashed #cfd8e3;
      border-radius: 16px;
      color: #64748b;
      background: #fafcff
    }

    .pager {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 24px
    }

    .pager button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      min-width: 120px
    }

    .pager button:disabled {
      opacity: .45;
      cursor: not-allowed
    }

    .dim {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .35);
      z-index: 15
    }

    @media (max-width:900px) {
      .app {
        grid-template-columns: 1fr
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(88vw, 360px);
        transform: translateX(-100%);
        transition: transform .22s ease;
        z-index: 20
      }

      .sidebar.open {
        transform: translateX(0)
      }

      .menu-toggle {
        display: inline-flex
      }

      .dim.show {
        display: block
      }

      .page {
        padding: 18px
      }

      .card {
        padding: 22px 18px
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand">JJSTAR мқҙмҡ© к°Җмқҙл“ң</div>
        <input id="searchInput" class="search" type="text" placeholder="л©”лүҙ кІҖмғү" />
        <div id="searchCount" class="search-count">м „мІҙ 0кұҙ</div>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>

    <main class="content">
      <div class="topbar">
        <button class="menu-toggle" id="menuToggle">вҳ° л©”лүҙ</button>
        <div class="breadcrumb" id="breadcrumb">JJSTAR мқҙмҡ© к°Җмқҙл“ң</div>
        <a href="jjstar_home.html" target="_top" class="home-link">
          <img src="assets/icons/home_fill.png" alt="мӢңмҠӨн…ң нҷҲ" class="home-icon">
        </a>
      </div>
      <section class="page">
        <article class="card">
          <div id="viewer" class="viewer">
            <div class="loading">л¬ём„ңлҘј лЎңл“ңн•ҳлҠ” мӨ‘мһ…лӢҲлӢӨ.</div>
          </div>
          <div class="pager">
            <button id="prevBtn">вҶҗ мқҙм „</button>
            <button id="nextBtn">лӢӨмқҢ вҶ’</button>
          </div>
        </article>
      </section>
    </main>
  </div>
  <div class="dim" id="dim"></div>

  <!-- Image Lightbox -->
  <div id="lightbox">
    <span class="close-btn">&times;</span>
    <img src="" id="lightbox-img">
  </div>

  <script src="data/menu.js"></script>
  <script src="assets/js/search.js"></script>
  <script>
    const menu = window.JJSTAR_MENU || [];
    const docs = [];
    menu.forEach(cat => {
      cat.children.forEach(mid => {
        docs.push({ type: 'mid', category: cat.title, title: mid.title, mid: mid.title, small: '', path: mid.path });
        mid.children.forEach(small => docs.push({ type: 'small', category: cat.title, title: small.title, mid: mid.title, small: small.title, path: small.path }));
      });
    });

    const nav = document.getElementById('nav');
    const viewer = document.getElementById('viewer');
    const breadcrumb = document.getElementById('breadcrumb');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const searchInput = document.getElementById('searchInput');
    const searchCountDisplay = document.getElementById('searchCount');
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const dim = document.getElementById('dim');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    let currentIndex = 0;
    let keyword = '';
    let openCategories = new Set([menu[0]?.title]);
    let openMids = new Set([menu[0]?.children[0]?.title]);

    // [Phase 3-1] мӨ‘м•ҷ кҙҖлҰ¬нҳ• л§ҒнҒ¬ лҚ°мқҙн„°м…Ӣ
    const GUIDE_LINKS = {
      "c01_m02_s06": "jjstar_mockup.html",
      // н–Ҙнӣ„ м¶”к°Җлҗ  л©”лүҙ мҪ”л“ңмҷҖ URL л§Өн•‘
    };

    function toggleMark(v) { return v ? 'вҲ’' : '+'; }

    function highlight(text) {
      if (typeof JJSTAR_SEARCH !== 'undefined') {
        return JJSTAR_SEARCH.highlightText(text, keyword);
      }
      return text;
    }

    function renderNav() {
      let filtered = menu;
      if (keyword && typeof JJSTAR_SEARCH !== 'undefined') {
        filtered = JJSTAR_SEARCH.filterMenu(menu, keyword);
      }

      nav.innerHTML = '';
      const current = docs[currentIndex];
      let totalVisibleItems = 0;

      filtered.forEach(cat => {
        const groupOpen = openCategories.has(cat.title);
        const group = document.createElement('section');
        group.className = `group ${groupOpen ? 'open' : ''}`;

        const gbtn = document.createElement('button');
        gbtn.className = 'group-btn';
        gbtn.innerHTML = `<span class="label">${highlight(cat.title)}</span><span class="indicator">${toggleMark(groupOpen)}</span>`;

        // [Step 1] лҢҖл¶„лҘҳ нҒҙлҰӯ мӢң н•ҳмң„ л©”лүҙ нҶ кёҖ (Phase 2-5)
        gbtn.onclick = (e) => {
          e.stopPropagation();
          if (openCategories.has(cat.title)) {
            openCategories.delete(cat.title);
          } else {
            // [Phase 2-6] мқјл°ҳ лӘЁл“ң(keyword м—ҶмқҢ)м—җм„ңл§Ң л°°нғҖм Ғ нҺјм№Ё м Ғмҡ©
            if (!keyword) openCategories.clear();
            openCategories.add(cat.title);
          }
          renderNav();
        };

        const gchildren = document.createElement('div');
        gchildren.className = 'group-children';

        cat.children.forEach(mid => {
          totalVisibleItems++;
          const midOpen = openMids.has(mid.title);
          const active = current && current.category === cat.title && current.mid === mid.title;
          const midWrap = document.createElement('div');
          midWrap.className = `mid ${midOpen ? 'open' : ''} ${active ? 'active' : ''}`;

          const mbtn = document.createElement('button');
          mbtn.className = 'mid-btn';
          if (active) mbtn.classList.add('is-active');
          mbtn.innerHTML = `<span class="label">${highlight(mid.title)}</span><span class="indicator">${toggleMark(midOpen)}</span>`;

          mbtn.onclick = (e) => {
            e.stopPropagation();
            if (openMids.has(mid.title)) {
              openMids.delete(mid.title);
            } else {
              // [Phase 2-6] мқјл°ҳ лӘЁл“ңм—җм„ңл§Ң лҸҷмқј м№ҙн…Ңкі лҰ¬ лӮҙ лӢӨлҘё мӨ‘л¶„лҘҳ лӢ«кё°
              if (!keyword) cat.children.forEach(m => openMids.delete(m.title));
              openMids.add(mid.title);
              openCategories.add(cat.title);
            }

            currentIndex = docs.findIndex(d => d.type === 'mid' && d.category === cat.title && d.mid === mid.title);
            renderDetail();
            renderNav();
            if (window.innerWidth <= 900) closeSidebar();
          };

          const mchildren = document.createElement('div');
          mchildren.className = 'mid-children';
          mid.children.forEach(small => {
            totalVisibleItems++;
            const btn = document.createElement('button');
            btn.className = 'small-btn';
            btn.innerHTML = `<span class="label">${highlight(small.title)}</span>`;

            const idx = docs.findIndex(d => d.type === 'small' && d.category === cat.title && d.mid === mid.title && d.small === small.title);
            if (idx === currentIndex) {
              btn.classList.add('active');
              btn.classList.add('is-active');
            }

            btn.onclick = (e) => {
              e.stopPropagation();
              openCategories.add(cat.title);
              openMids.add(mid.title);
              currentIndex = idx;
              renderDetail();
              renderNav();
              if (window.innerWidth <= 900) closeSidebar();
            };
            mchildren.appendChild(btn);
          });

          midWrap.appendChild(mbtn);
          midWrap.appendChild(mchildren);
          gchildren.appendChild(midWrap);
        });

        group.appendChild(gbtn);
        group.appendChild(gchildren);
        nav.appendChild(group);
      });

      // [Phase 2-6] кІҖмғү кІ°кіј м№ҙмҡҙнҠё: л§Өм№ӯлҗң мҙқ н•ӯлӘ© мҲҳ
      searchCountDisplay.textContent = keyword ? `кІҖмғү кІ°кіј: ${totalVisibleItems}кұҙ` : `м „мІҙ л©”лүҙ: ${docs.length}кұҙ`;

      if (keyword && totalVisibleItems === 0) {
        nav.innerHTML = '<div class="empty" style="margin:20px; color:#fff; text-align:center;">мқјм№ҳн•ҳлҠ” кІҖмғү кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ.</div>';
      }

      // Scroll active item into view
      setTimeout(() => {
        const activeItem = nav.querySelector('.is-active');
        if (activeItem) {
          activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    }

    async function renderDetail() {
      const current = docs[currentIndex];
      if (!current) return;

      // [Phase 3-7] м •л°Җн•ң Base URL м¶”м¶ң: index.htmlмқҙ мң„м№ҳн•ң м ҲлҢҖ нҸҙлҚ” кІҪлЎң нҷ•ліҙ
      const absoluteBase = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');

      // Explore focus: active and expand current doc lineage
      openCategories.add(current.category);
      openMids.add(current.mid);

      breadcrumb.innerHTML = '';
      const parts = [{ label: 'нҷҲ', level: 'home' }];
      parts.push({ label: current.category, level: 'cat' });
      if (current.mid) parts.push({ label: current.mid, level: 'mid' });
      if (current.small) parts.push({ label: current.small, level: 'small' });

      parts.forEach((p, index) => {
        const span = document.createElement('span');
        span.className = 'breadcrumb-item';
        if (index === parts.length - 1) span.classList.add('active');
        span.textContent = p.label;
        
        // нҒҙлҰӯ мӢң н•ҙлӢ№ м№ҙн…Ңкі лҰ¬мқҳ мІ« лІҲм§ё л¬ём„ңлЎң мқҙлҸҷ
        span.onclick = () => {
          if (index === parts.length - 1) return; // нҳ„мһ¬ нҺҳмқҙм§Җл©ҙ л¬ҙмӢң
          
          let targetIdx = -1;
          if (p.level === 'home') {
            targetIdx = docs.findIndex(d => d.path === 'pages/c01_star-hagsaengjiweon/c01_m01_star-gwanri.html');
            if (targetIdx === -1) targetIdx = 0;
          } else if (p.level === 'cat') {
            targetIdx = docs.findIndex(d => d.category === p.label);
          } else if (p.level === 'mid') {
            targetIdx = docs.findIndex(d => d.category === current.category && d.mid === p.label);
          }
          
          if (targetIdx !== -1) {
            currentIndex = targetIdx;
            renderDetail();
            renderNav();
          }
        };
        breadcrumb.appendChild(span);
      });

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === docs.length - 1;
      viewer.innerHTML = '<div class="loading">л¬ём„ңлҘј лЎңл“ңн•ҳлҠ” мӨ‘мһ…лӢҲлӢӨ.</div>';

      try {
        // [Phase 3-7] absoluteBaseмҷҖ кІ°н•©н•ҳм—¬ м–ҙл–Ө нҷҳкІҪм—җм„ңлҸ„ м •нҷ•н•ң кІҪлЎңлЎң fetch
        const res = await fetch(absoluteBase + current.path);
        if (!res.ok) throw new Error(`л¬ём„ңлҘј лЎңл“ңн•  мҲҳ м—ҶмҠөлӢҲлӢӨ. (Status: ${res.status})`);
        let html = await res.text();

        // [Phase 3-7] лӘЁл“  лЎңм»¬ src кІҪлЎң(../../ л“ұ)лҘј absoluteBase кё°л°ҳ м ҲлҢҖ кІҪлЎңлЎң к°•м ң м№ҳнҷҳ
        html = html.replace(/src="(?!http|https|data:)/g, 'src="' + absoluteBase);

        viewer.innerHTML = html;
        document.querySelector('.page').scrollTop = 0;

        const h1 = viewer.querySelector('h1');
        if (h1) h1.textContent = current.small || current.mid || current.title;

        // [Phase 3-1] мӨ‘м•ҷ кҙҖлҰ¬нҳ• л§ҒнҒ¬ мЈјмһ…
        const directLinkBtn = viewer.querySelector('#direct-link');
        if (directLinkBtn) {
          // нҢҢмқјлӘ…м—җм„ң мҪ”л“ң м¶”м¶ң (мҳҲ: c01_m02_s06_...html -> c01_m02_s06)
          const fileName = current.path.split('/').pop();
          const match = fileName.match(/^[a-z0-9]+_[a-z0-9]+_[a-z0-9]+/);
          const menuCode = match ? match[0] : null;

          if (menuCode && GUIDE_LINKS[menuCode]) {
            directLinkBtn.href = GUIDE_LINKS[menuCode];
            directLinkBtn.target = "_blank";
          } else {
            directLinkBtn.style.display = 'none'; // л§ҒнҒ¬к°Җ м—ҶлҠ” кІҪмҡ° лІ„нҠј мҲЁк№Җ
          }
        }

      } catch (e) {
        viewer.innerHTML = `
          <div class="empty">
            <strong>${current.title}</strong><br><br>
            <span style="color:#ef4444;">мҳӨлҘҳ л°ңмғқ: ${e.message}</span><br><br>
            <small>Live Server(http://...) нҷҳкІҪм—җм„ң мӢӨн–ү мӨ‘мқём§Җ нҷ•мқён•ҙмЈјм„ёмҡ”.</small>
          </div>`;
      }
    }

    viewer.addEventListener('click', e => {
      if (e.target.tagName === 'IMG') {
        lightboxImg.src = e.target.src;
        lightbox.classList.add('show');
      }
    });

    lightbox.onclick = () => lightbox.classList.remove('show');

    function closeSidebar() { sidebar.classList.remove('open'); dim.classList.remove('show'); }
    function openSidebar() { sidebar.classList.add('open'); dim.classList.add('show'); }

    menuToggle.onclick = () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    dim.onclick = closeSidebar;

    let searchTimer;
    searchInput.addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const prevKeyword = keyword;
        keyword = e.target.value.trim().toLowerCase();

        if (keyword && keyword !== prevKeyword && typeof JJSTAR_SEARCH !== 'undefined') {
          const filtered = JJSTAR_SEARCH.filterMenu(menu, keyword);
          filtered.forEach(cat => {
            if (cat._hasSmallMatch) openCategories.add(cat.title);
            cat.children.forEach(mid => {
              if (mid._hasSmallMatch) openMids.add(mid.title);
            });
          });
        } else if (!keyword && prevKeyword) {
          // [Step 3] кІҖмғүм–ҙ мӮӯм ң мӢң мҙҲкё°нҷ” (Phase 2-5)
          openCategories.clear();
          openMids.clear();
          if (docs[currentIndex]) {
            openCategories.add(docs[currentIndex].category);
            openMids.add(docs[currentIndex].mid);
          }
        }

        renderNav();
      }, 250);
    });

    prevBtn.onclick = () => { if (currentIndex > 0) { currentIndex--; renderDetail(); renderNav(); } };
    nextBtn.onclick = () => { if (currentIndex < docs.length - 1) { currentIndex++; renderDetail(); renderNav(); } };

    const startPath = 'pages/c01_star-hagsaengjiweon/c01_m01_star-gwanri.html';
    const startIdx = docs.findIndex(d => d.path === startPath);
    currentIndex = startIdx !== -1 ? startIdx : 0;
    renderDetail();
    renderNav();

    // [Phase 3-10] iframe лӮҙ лЎңл“ң мӢң мҠӨнҒ¬лЎӨ м •мұ… к°•м ң нҷңм„ұнҷ”
    window.addEventListener('load', () => {
      if (window.self !== window.top) {
        document.documentElement.style.overflow = 'auto';
        document.body.style.overflow = 'auto';
        // мҪҳн…җмё  мҳҒм—ӯ(.page)мқҳ мҠӨнҒ¬лЎӨл°”к°Җ мғқкё°лҸ„лЎқ ліҙмһҘ
        const page = document.querySelector('.page');
        if (page) page.style.overflowY = 'auto';
      }
    });
  </script>
</body>
